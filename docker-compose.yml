name: rds-2p-assistants-skills

services:
  redis:
    image: redis:7-alpine
    container_name: rds-2p-assistants-skills-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --dir
      - /data
      - --requirepass
      - "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env — see .env.example}"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - robot-services-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  robot-gateway:
    image: rds-2p-assistants-skills-robot-gateway
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: rds-2p-assistants-skills-robot-gateway
    ports:
      - "50051:50051"
    restart: unless-stopped
    networks:
      - robot-services-network

  salute:
    image: rds-2p-assistants-skills-salute
    build:
      context: .
      dockerfile: Dockerfile.salute
    container_name: rds-2p-assistants-skills-salute
    ports:
      - "20000:8000"
    volumes:
      - salute_logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - CVC_SERVICE_URL=http://cvc-api:20001
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ROBOT_GATEWAY_URL=robot-gateway:50051
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      robot-gateway:
        condition: service_started
    networks:
      - robot-services-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  alice:
    image: rds-2p-assistants-skills-alice
    build:
      context: .
      dockerfile: Dockerfile.alice
    container_name: rds-2p-assistants-skills-alice
    ports:
      - "20002:8000"
    volumes:
      - alice_logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - CVC_SERVICE_URL=http://cvc-api:20001
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ROBOT_GATEWAY_URL=robot-gateway:50051
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      robot-gateway:
        condition: service_started
    networks:
      - robot-services-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
  salute_logs:
  alice_logs:

networks:
  robot-services-network:
    external: true
