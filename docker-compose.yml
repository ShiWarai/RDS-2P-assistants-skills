name: rds-2p-salute

services:
  redis:
    image: redis:7-alpine
    container_name: rds-2p-salute-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --dir
      - /data
      - --requirepass
      - "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env — see .env.example}"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - robot-services-network
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "-a",
          "${REDIS_PASSWORD}",
          "ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: rds-2p-salute-app
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rds-2p-salute-app
    ports:
      - "20000:8000"
      - "50051:50051"
    volumes:
      - app_logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - CVC_SERVICE_URL=http://cvc-api:20001
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - robot-services-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
  app_logs:

networks:
  robot-services-network:
    external: true
