name: Test Robot Commands

on:
  repository_dispatch:
    types: [robot-command]
  workflow_dispatch:
    inputs:
      command:
        description: 'Команда для робота (attention, lie_down, stand_up)'
        required: true
        type: choice
        options:
          - attention
          - lie_down
          - stand_up
  push:
    branches:
      - main
    paths:
      - 'src/main.sc'
      - 'caila_import.json'

jobs:
  test-commands:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Determine command
        id: command
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "action=${{ github.event.client_payload.action }}" >> $GITHUB_OUTPUT
            echo "command=${{ github.event.client_payload.action }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.command }}" >> $GITHUB_OUTPUT
            echo "command=${{ github.event.inputs.command }}" >> $GITHUB_OUTPUT
          else
            echo "action=attention" >> $GITHUB_OUTPUT
            echo "command=attention" >> $GITHUB_OUTPUT
          fi

      - name: Test 'равняйсь' command (attention)
        if: steps.command.outputs.command == 'attention'
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.ROBOT_WEBHOOK_URL || 'https://webhook.site/your-webhook-id' }}
          method: 'POST'
          contentType: 'application/json'
          data: '{"action": "attention"}'
          timeout: 10000

      - name: Test 'лежать' command (lie_down)
        if: steps.command.outputs.command == 'lie_down'
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.ROBOT_WEBHOOK_URL || 'https://webhook.site/your-webhook-id' }}
          method: 'POST'
          contentType: 'application/json'
          data: '{"action": "lie_down"}'
          timeout: 10000

      - name: Test 'вставай' command (stand_up)
        if: steps.command.outputs.command == 'stand_up'
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.ROBOT_WEBHOOK_URL || 'https://webhook.site/your-webhook-id' }}
          method: 'POST'
          contentType: 'application/json'
          data: '{"action": "stand_up"}'
          timeout: 10000

      - name: Test all commands (on push)
        if: github.event_name == 'push'
        run: |
          echo "Testing all robot commands..."
          echo "Command: attention"
          curl -X POST "${{ secrets.ROBOT_WEBHOOK_URL || 'https://webhook.site/your-webhook-id' }}" \
            -H "Content-Type: application/json" \
            -d '{"action": "attention"}' \
            -w "\nStatus: %{http_code}\n"
          
          sleep 2
          
          echo "Command: lie_down"
          curl -X POST "${{ secrets.ROBOT_WEBHOOK_URL || 'https://webhook.site/your-webhook-id' }}" \
            -H "Content-Type: application/json" \
            -d '{"action": "lie_down"}' \
            -w "\nStatus: %{http_code}\n"
          
          sleep 2
          
          echo "Command: stand_up"
          curl -X POST "${{ secrets.ROBOT_WEBHOOK_URL || 'https://webhook.site/your-webhook-id' }}" \
            -H "Content-Type: application/json" \
            -d '{"action": "stand_up"}' \
            -w "\nStatus: %{http_code}\n"

      - name: Log results
        run: |
          echo "Command tested: ${{ steps.command.outputs.command }}"
          echo "Workflow completed successfully"

