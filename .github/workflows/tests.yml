name: Tests

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  test:
    name: Run tests in Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set runner user for containers
        run: |
          echo "RUNNER_UID=$(id -u)" >> $GITHUB_ENV
          echo "RUNNER_GID=$(id -g)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build dev image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ./Dockerfile.dev
          tags: rds-2p-assistants-skills-dev:latest
          load: true
          push: false

      - name: Lint with ruff
        run: |
          set -e
          docker compose -f docker-compose.dev.yml run --rm -T dev ruff check . --output-format=github

      - name: Run tests in container
        run: |
          docker compose -f docker-compose.dev.yml run --rm dev pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  notify-telegram-on-success:
    name: Notify Telegram on success
    if: always() && needs.test.result == 'success'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification (silent)
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          disable_notification: true
          message: |
            *Тесты прошли успешно*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-telegram-on-failure:
    name: Notify Telegram on failure
    if: always() && needs.test.result == 'failure'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Тесты не прошли*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
