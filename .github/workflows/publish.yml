name: Publish Docker image

on:
  workflow_run:
    workflows: ["Deploy"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_GATEWAY=ghcr.io/${OWNER}/rds-2p-assistants-skills-robot-gateway" >> $GITHUB_ENV
          echo "IMAGE_SALUTE=ghcr.io/${OWNER}/rds-2p-assistants-skills-salute" >> $GITHUB_ENV
          echo "IMAGE_ALICE=ghcr.io/${OWNER}/rds-2p-assistants-skills-alice" >> $GITHUB_ENV

      - name: Build and push robot-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_GATEWAY }}:main
            ${{ env.IMAGE_GATEWAY }}:${{ github.event.workflow_run.head_sha }}
          push: true
          provenance: false

      - name: Build and push salute
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.salute
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_SALUTE }}:main
            ${{ env.IMAGE_SALUTE }}:${{ github.event.workflow_run.head_sha }}
          push: true
          provenance: false

      - name: Build and push alice
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.alice
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_ALICE }}:main
            ${{ env.IMAGE_ALICE }}:${{ github.event.workflow_run.head_sha }}
          push: true
          provenance: false

  notify-telegram-on-publish:
    name: Notify Telegram on image published
    if: always() && needs.publish.result == 'success'
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification (silent)
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          disable_notification: true
          message: |
            *Образы успешно опубликованы в GHCR*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.event.workflow_run.head_branch }}`
            Gateway: `ghcr.io/${{ github.repository_owner }}/rds-2p-assistants-skills-robot-gateway:main`
            Salute: `ghcr.io/${{ github.repository_owner }}/rds-2p-assistants-skills-salute:main`
            Alice: `ghcr.io/${{ github.repository_owner }}/rds-2p-assistants-skills-alice:main`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
