name: Publish Docker image

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    if: github.event.workflow_run.conclusion == 'success'
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: echo "IMAGE_BASE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/rds-2p-salute-app" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_BASE }}:main
            ${{ env.IMAGE_BASE }}:${{ github.event.workflow_run.head_sha }}
          push: true

  notify-telegram-on-publish:
    name: Notify Telegram on image published
    if: always() && needs.publish.result == 'success'
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification (silent)
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          disable_notification: true
          message: |
            *Образ успешно опубликован в GHCR*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.event.workflow_run.head_branch }}`
            Образ: `ghcr.io/${{ github.repository_owner }}/rds-2p-salute-app:main`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
