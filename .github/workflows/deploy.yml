name: Deploy

on:
  push:
    branches: [main, dev]
  workflow_dispatch:
    inputs:
      publish_prerelease:
        description: "Собрать и опубликовать prerelease-образы в GHCR (тег :prerelease)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run tests in Docker
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set runner user for containers
        run: |
          echo "RUNNER_UID=$(id -u)" >> $GITHUB_ENV
          echo "RUNNER_GID=$(id -g)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Build dev image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ./Dockerfile.dev
          tags: rds-2p-assistants-skills-dev:latest
          load: true
          push: false

      - name: Lint with ruff
        run: |
          set -e
          docker compose -f docker-compose.dev.yml run --rm -T dev ruff check . --output-format=github

      - name: Run tests in container
        run: |
          docker compose -f docker-compose.dev.yml run --rm dev pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

  # Prerelease: публикация prod-образов для тестового окружения до merge в main.
  # Запуск: push в dev с [prerelease] в сообщении коммита, или workflow_dispatch с publish_prerelease.
  publish-prerelease:
    name: Publish prerelease images to GHCR
    needs: test
    if: |
      needs.test.result == 'success' && (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_prerelease == 'true') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/dev' && contains(github.event.head_commit.message, '[prerelease]'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image names
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          echo "IMAGE_GATEWAY=ghcr.io/${OWNER}/rds-2p-assistants-skills-robot-gateway" >> $GITHUB_ENV
          echo "IMAGE_SALUTE=ghcr.io/${OWNER}/rds-2p-assistants-skills-salute" >> $GITHUB_ENV
          echo "IMAGE_ALICE=ghcr.io/${OWNER}/rds-2p-assistants-skills-alice" >> $GITHUB_ENV

      - name: Build and push robot-gateway (prerelease)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.gateway
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_GATEWAY }}:prerelease
            ${{ env.IMAGE_GATEWAY }}:${{ github.sha }}
          push: true
          provenance: false

      - name: Build and push salute (prerelease)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.salute
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_SALUTE }}:prerelease
            ${{ env.IMAGE_SALUTE }}:${{ github.sha }}
          push: true
          provenance: false

      - name: Build and push alice (prerelease)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.alice
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_ALICE }}:prerelease
            ${{ env.IMAGE_ALICE }}:${{ github.sha }}
          push: true
          provenance: false

      - name: Send Telegram notification (prerelease)
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          disable_notification: true
          message: |
            *Prerelease-образы опубликованы в GHCR*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            Тег: `:prerelease` и `:${{ github.sha }}`
            Gateway: `ghcr.io/${{ github.repository_owner }}/rds-2p-assistants-skills-robot-gateway:prerelease`
            Salute: `ghcr.io/${{ github.repository_owner }}/rds-2p-assistants-skills-salute:prerelease`
            Alice: `ghcr.io/${{ github.repository_owner }}/rds-2p-assistants-skills-alice:prerelease`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-telegram-on-success:
    name: Notify Telegram on success
    if: always() && needs.test.result == 'success'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification (silent)
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          disable_notification: true
          message: |
            *Тесты прошли успешно*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  notify-telegram-on-failure:
    name: Notify Telegram on failure
    if: always() && needs.test.result == 'failure'
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram notification
        uses: appleboy/telegram-action@v1.0.1
        continue-on-error: true
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *Тесты не прошли*
            Репозиторий: `${{ github.repository }}`
            Ветка: `${{ github.ref_name }}`
            [Открыть run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
