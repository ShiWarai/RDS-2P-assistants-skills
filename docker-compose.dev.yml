# Только dev-контейнер для линта и тестов (без redis/gateway/salute/alice).
name: rds-2p-assistants-skills-dev

services:
  dev:
    image: rds-2p-assistants-skills-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rds-2p-assistants-skills-dev
    user: "${RUNNER_UID:-0}:${RUNNER_GID:-0}"
    volumes:
      - .:/app
    working_dir: /app
